<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Robot head -->
  <rect x="72" y="70" width="112" height="90" rx="20" fill="rgba(255,255,255,0.2)"/>

  <!-- Eyes -->
  <rect x="96" y="96" width="22" height="22" rx="6" fill="white"/>
  <rect x="138" y="96" width="22" height="22" rx="6" fill="white"/>
  <circle cx="107" cy="107" r="6" fill="#4f46e5"/>
  <circle cx="149" cy="107" r="6" fill="#4f46e5"/>

  <!-- Mouth -->
  <rect x="100" y="130" width="56" height="10" rx="5" fill="rgba(255,255,255,0.6)"/>

  <!-- Antenna -->
  <rect x="124" y="50" width="8" height="22" rx="4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="128" cy="46" r="8" fill="white"/>

  <!-- Speech bubble -->
  <rect x="152" y="172" width="72" height="46" rx="12" fill="white"/>
  <polygon points="160,172 148,158 172,172" fill="white"/>
  <!-- Dots in bubble -->
  <circle cx="172" cy="195" r="5" fill="#7c3aed"/>
  <circle cx="188" cy="195" r="5" fill="#7c3aed"/>
  <circle cx="204" cy="195" r="5" fill="#7c3aed"/>

  <!-- Neck -->
  <rect x="116" y="158" width="24" height="16" rx="4" fill="rgba(255,255,255,0.2)"/>
</svg>
